<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>NIDS Intrusion Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 600px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        h2 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 48%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .rf {
            background: #22c55e;
        }

        .xgb {
            background: #3b82f6;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
        }

        small {
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 NIDS Intrusion Detection</h2>

    <small>Enter 78 comma-separated feature values</small>

    <textarea id="features" placeholder="Enter 78 values separated by commas"></textarea>

    <div style="display:flex; justify-content: space-between;">
        <button class="rf" onclick="predict('rf')">Predict RF</button>
        <button class="xgb" onclick="predict('xgb')">Predict XGBoost</button>
    </div>

    <div class="result" id="result">
        Result will appear here...
    </div>
</div>

<script>
async function predict(model) {
    const input = document.getElementById("features").value;

    const features = input.split(",")
        .map(x => parseFloat(x.trim()))
        .filter(x => !isNaN(x));

    if (features.length !== 78) {
        document.getElementById("result").innerText =
            "❌ Please enter exactly 78 numeric values.";
        return;
    }

    const response = await fetch(`/predict/${model}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ features: features })
    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
        `<b>Prediction:</b> ${data.prediction}`;
}
</script>

</body>
</html>
